  <text x="438" y="505" fill="#BE185D" font-size="18" font-family="Arial, Helvetica, sans-serif">Svelte</text>
  <rect x="568" y="480" width="178" height="40" rx="20" fill="#EEF2FF"/>
  <text x="603" y="505" fill="#4338CA" font-size="18" font-family="Arial, Helvetica, sans-serif">Vanilla TS</text>

  <rect x="760" y="108" width="426" height="324" rx="28" fill="#FBF7EF" fill-opacity="0.92"/>
  <text x="800" y="156" fill="#0F172A" font-size="22" font-family="Arial, Helvetica, sans-serif" font-weight="700">What it ships</text>

  <text x="800" y="210" fill="#475467" font-size="20" font-family="Arial, Helvetica, sans-serif">• Skill bundle for real Pretext routing</text>
  <text x="800" y="248" fill="#475467" font-size="20" font-family="Arial, Helvetica, sans-serif">• Official-family examples and blueprints</text>
  <text x="800" y="286" fill="#475467" font-size="20" font-family="Arial, Helvetica, sans-serif">• React / Vue / Svelte / Vanilla integrations</text>
  <text x="800" y="324" fill="#475467" font-size="20" font-family="Arial, Helvetica, sans-serif">• No DOM text reads in the hot path</text>
  <text x="800" y="362" fill="#475467" font-size="20" font-family="Arial, Helvetica, sans-serif">• npm package + GitHub release</text>

  <rect x="760" y="460" width="426" height="108" rx="28" fill="#0E1726"/>
