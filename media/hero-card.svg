  <text x="72" y="188" fill="#0E1726" font-size="70" font-weight="700" font-family="Georgia, 'Times New Roman', serif">Pretext Frontend Motion</text>
  <text x="72" y="242" fill="#334155" font-size="28" font-family="Arial, Helvetica, sans-serif">Multi-CLI skill bundle and npm package for text layout, typography,</text>
  <text x="72" y="280" fill="#334155" font-size="28" font-family="Arial, Helvetica, sans-serif">and frontend motion powered by real Pretext measurement.</text>

