  <text x="704" y="441" fill="#0F172A" font-size="20" font-family="Arial, Helvetica, sans-serif">Gemini CLI</text>

  <rect x="72" y="480" width="156" height="40" rx="20" fill="#E8EEFF"/>
  <text x="101" y="505" fill="#1D4ED8" font-size="18" font-family="Arial, Helvetica, sans-serif">React</text>
