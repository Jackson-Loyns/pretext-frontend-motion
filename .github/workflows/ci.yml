name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install root dependencies
        run: npm install

      - name: Build CLI
        run: npm run build

      - name: Run CLI tests
        run: npm test

      - name: Validate repository structure
        run: python3 scripts/validate_skill.py .

      - name: Check framework integrations
        run: npm run check:integrations
